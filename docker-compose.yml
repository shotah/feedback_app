services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/feedback_poc
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:?set Google OAuth client id}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:?set Google OAuth client secret}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      FEEDBACK_INGEST_API_KEY: ${FEEDBACK_INGEST_API_KEY}
    depends_on:
      - mongo

volumes:
  mongo_data:
